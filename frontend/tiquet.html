<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeeLab - Tiquets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 text-slate-950 antialiased">
    <div class="page-wrapper min-h-screen">
        <header class="border-b border-slate-200 bg-white/95 backdrop-blur sticky top-0 z-50">
            <div class="mx-auto max-w-7xl px-6 py-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-sm font-semibold text-slate-700">T</div>
                    <div>
                        <p class="text-xs uppercase tracking-[0.35em] text-slate-400">TeeLab</p>
                        <h1 class="text-2xl font-serif tracking-tight">Tiquets</h1>
                    </div>
                </div>
                <nav class="flex flex-wrap gap-4 text-sm uppercase tracking-[0.2em] text-slate-700">
                    <a href="index.html" class="nav-link">Inicio</a>
                    <a href="cart.html" class="nav-link">Carrito</a>
                    <a href="tiquet.html" class="nav-link">Compras</a>
                </nav>
            </div>
        </header>

        <main class="mx-auto max-w-5xl px-6 py-10">
            <section class="space-y-8 rounded-[32px] border border-slate-200 bg-white p-8 shadow-sm">
                <div class="text-center">
                    <p class="text-xs uppercase tracking-[0.35em] text-slate-400 mb-3">Historial de pedidos</p>
                    <h2 class="text-3xl font-serif">Tus comandas</h2>
                    <p class="mt-3 text-slate-600">Aquí puedes ver todas tus compras.</p>
                </div>
                <section id="tiquets_list" class="space-y-6"></section>
            </section>
        </main>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/comandas';

        async function loadComandas() {
            const section = document.getElementById('tiquets_list');

            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }
                const comandas = await response.json();

                if (comandas.length === 0) {
                    section.innerHTML = '<p class="text-center text-slate-500">No hay comandas guardadas.</p>';
                    return;
                }

                const sortedComandas = comandas.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                section.innerHTML = sortedComandas.map(comanda => createComandaCard(comanda)).join('');

            } catch (error) {
                console.error('Error al cargar comandas:', error);
                section.innerHTML = '<p class="text-center text-red-500">Error al cargar las comandas. Asegúrate de que el servidor esté activo.</p>';
            }
        }

        function createComandaCard(comanda) {
            const fecha = new Date(comanda.fecha).toLocaleDateString('es-ES', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
            const totalItems = comanda.items.reduce((sum, item) => sum + item.cantidad, 0);

            return `
                <a href="tiquetDetail.html?id=${comanda.id}" class="producto product-card hover:shadow-md transition-shadow no-underline">
                    <div class="producto-body">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-lg font-serif">Pedido #${comanda.id}</h3>
                                <div class="producto-meta-grid mt-2">
                                    <span>Fecha: ${fecha}</span>
                                    <span>Artículos: ${totalItems}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="producto-price text-xl">€${comanda.total.toFixed(2)}</p>
                                <span class="inline-block mt-2 px-3 py-1 rounded-full text-xs uppercase tracking-wider ${
                                    comanda.estado === 'completado' ? 'bg-green-100 text-green-700' :
                                    comanda.estado === 'pendiente' ? 'bg-yellow-100 text-yellow-700' :
                                    'bg-slate-100 text-slate-700'
                                }">${comanda.estado}</span>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }

        function viewTiquetDetail(id) {
            localStorage.setItem('comanda_id', id);
            localStorage.setItem('comanda_enviada', 'true');
            window.location.href = 'tiquetDetail.html';
        }

        loadComandas();
    </script>

    <footer class="border-t border-slate-200 bg-white/95 backdrop-blur text-center py-6 text-slate-400 text-sm tracking-[0.3em] uppercase">
        TEELAB
    </footer>
</body>

</html>
