<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeeLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 text-slate-950 antialiased">
    <div class="page-wrapper min-h-screen">
        <header class="border-b border-slate-200 bg-white/95 backdrop-blur sticky top-0 z-50">
            <div class="mx-auto max-w-7xl px-6 py-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-sm font-semibold text-slate-700">T</div>
                    <div>
                        <p class="text-xs uppercase tracking-[0.35em] text-slate-400">TeeLab</p>
                        <h1 class="text-2xl font-serif tracking-tight">Exclusive Apparel</h1>
                    </div>
                </div>
                <nav class="flex flex-wrap gap-4 text-sm uppercase tracking-[0.2em] text-slate-700">
                    <a href="index.html" class="nav-link">Inicio</a>
                    <a href="cart.html" class="nav-link">Carrito</a>
                </nav>
            </div>
        </header>

        <main class="mx-auto max-w-7xl px-6 py-10">
            <section class="mb-10 text-center">
                <p class="text-xs uppercase tracking-[0.35em] text-slate-400 mb-4">Nueva Temporada</p>
                <h2 class="text-4xl md:text-5xl font-serif mb-4">Colección limitada de camisetas</h2>
                <p class="mx-auto max-w-2xl text-slate-600">Descubre piezas con un estilo moderno y sofisticado, diseñadas para combinar comodidad y elegancia en cada ocasión.</p>
            </section>

            <div class="grid gap-10 lg:grid-cols-[280px_minmax(0,1fr)]">
                <aside class="space-y-8 rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
                    <div>
                        <h2 class="text-xs uppercase tracking-[0.35em] text-slate-400 mb-5">Filtrar por</h2>
                        <div class="space-y-5">
                            <div>
                                <label for="search" class="block text-sm font-medium text-slate-700 mb-2">Buscar</label>
                                <input type="text" id="search" name="search" class="form-input" placeholder="Buscar pieza...">
                            </div>
                            <div>
                                <label for="size" class="block text-sm font-medium text-slate-700 mb-2">Talla</label>
                                <select name="size" id="size" class="form-select">
                                    <option value="">Todas</option>
                                    <option value="S">S</option>
                                    <option value="M">M</option>
                                    <option value="L">L</option>
                                    <option value="XL">XL</option>
                                    <option value="XXL">XXL</option>
                                </select>
                            </div>
                            <div>
                                <label for="color" class="block text-sm font-medium text-slate-700 mb-2">Color</label>
                                <select name="color" id="color" class="form-select">
                                    <option value="">Todos</option>
                                    <option value="blanco">Blanco</option>
                                    <option value="negro">Negro</option>
                                    <option value="gris">Gris</option>
                                    <option value="mostaza">Mostaza</option>
                                    <option value="azul">Azul</option>
                                </select>
                            </div>
                            <div>
                                <label for="orden" class="block text-sm font-medium text-slate-700 mb-2">Ordenar por</label>
                                <select name="orden" id="orden" class="form-select">
                                    <option value="">Seleccionar</option>
                                    <option value="nombre_asc">Nombre A-Z</option>
                                    <option value="nombre_desc">Nombre Z-A</option>
                                    <option value="precio_asc">Precio menor a mayor</option>
                                    <option value="precio_desc">Precio mayor a menor</option>
                                </select>
                            </div>
                            <button type="button" id="filtrar" onclick="loadCatalogo()" class="button w-full">Filtrar</button>
                        </div>
                    </div>
                </aside>

                <section class="space-y-6">
                    <div id="catalogo" class="grid gap-6 sm:grid-cols-2 xl:grid-cols-3"></div>
                    <p id="catalog-empty" class="hidden text-center text-slate-500 italic">No se han encontrado piezas con estos criterios.</p>
                </section>
            </div>
        </main>
    </div>

    <script src="js/cart-utils.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
